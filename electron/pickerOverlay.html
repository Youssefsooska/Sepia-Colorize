<!--
  Fullscreen picker overlay (renderer document).

  When the pick-color hotkey fires, main creates a transparent window covering
  the active display and loads this file. We:
    1. Ask the main process for a screenshot of the screen (via preload).
    2. Paint it full-screen into a hidden canvas for sampling.
    3. Follow the cursor with a magnifier loupe that reads pixels from that
       canvas and shows an 8x zoom around the mouse position.
    4. On click, read the exact pixel RGB, convert to hex, and send it back
       to main via preload's `sendResult` — which closes the window.
    5. On Escape, call `cancel()` which also closes the window.
-->
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: transparent;
        cursor: none;
        font-family: -apple-system, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
        color: #fff;
        user-select: none;
      }
      #bg {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
      }
      #loupe {
        position: fixed;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        pointer-events: none;
        overflow: hidden;
        transform: translate(-50%, -50%);
        background: #000;
      }
      #loupe canvas {
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 8px;
        height: 8px;
        transform: translate(-50%, -50%);
        border: 1.5px solid #fff;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
        pointer-events: none;
      }
      #hexBadge {
        position: fixed;
        pointer-events: none;
        background: rgba(20, 20, 20, 0.9);
        color: #fff;
        font-family: "SF Mono", "Consolas", monospace;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        transform: translate(-50%, 0);
      }
    </style>
  </head>
  <body>
    <canvas id="bg"></canvas>
    <div id="loupe">
      <canvas id="loupeCanvas" width="15" height="15"></canvas>
      <div id="crosshair"></div>
    </div>
    <div id="hexBadge">#------</div>

    <script>
      // Renderer code runs in an isolated world; the preload exposed
      // `window.sepiaPicker` with getScreenSources / sendResult / cancel.
      const bg = document.getElementById('bg');
      const bgCtx = bg.getContext('2d', { willReadFrequently: true });
      const loupeCanvas = document.getElementById('loupeCanvas');
      const loupeCtx = loupeCanvas.getContext('2d');
      loupeCtx.imageSmoothingEnabled = false;
      const loupe = document.getElementById('loupe');
      const badge = document.getElementById('hexBadge');

      const toHex = (n) => n.toString(16).padStart(2, '0').toUpperCase();
      const rgbToHex = (r, g, b) => `#${toHex(r)}${toHex(g)}${toHex(b)}`;

      let screenshotImg = null;

      async function loadScreenshot() {
        // Size the canvas to the window size (the overlay covers one display).
        bg.width = window.innerWidth;
        bg.height = window.innerHeight;
        try {
          const sources = await window.sepiaPicker.getScreenSources();
          if (!sources.length) return;
          const img = new Image();
          img.onload = () => {
            bgCtx.drawImage(img, 0, 0, bg.width, bg.height);
            screenshotImg = img;
          };
          img.src = sources[0].thumbnailDataUrl;
        } catch (err) {
          // If capture fails we still let the picker shell work — we just
          // won't have pixel data, so the hex will fall back to black.
          console.warn('Sepia picker: failed to capture screen', err);
        }
      }

      function sampleAt(x, y) {
        try {
          const data = bgCtx.getImageData(x, y, 1, 1).data;
          return { r: data[0], g: data[1], b: data[2] };
        } catch {
          return { r: 0, g: 0, b: 0 };
        }
      }

      function updateLoupe(e) {
        const x = e.clientX;
        const y = e.clientY;
        loupe.style.left = x + 'px';
        loupe.style.top = y + 'px';

        // Draw zoomed 15x15 region from the bg canvas into the loupe.
        if (screenshotImg) {
          loupeCtx.clearRect(0, 0, 15, 15);
          loupeCtx.drawImage(
            bg,
            Math.max(0, x - 7), Math.max(0, y - 7), 15, 15,
            0, 0, 15, 15,
          );
        }

        const { r, g, b } = sampleAt(x, y);
        const hex = rgbToHex(r, g, b);
        badge.textContent = hex;
        badge.style.left = x + 'px';
        badge.style.top = (y + 80) + 'px';
      }

      function pickAt(e) {
        const { r, g, b } = sampleAt(e.clientX, e.clientY);
        window.sepiaPicker.sendResult({ hex: rgbToHex(r, g, b), rgb: { r, g, b } });
      }

      window.addEventListener('mousemove', updateLoupe);
      window.addEventListener('click', pickAt);
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') window.sepiaPicker.cancel();
      });

      loadScreenshot();
    </script>
  </body>
</html>
