# electron-builder configuration for packaging Sepia.
# Produces a .dmg for macOS and an NSIS installer + portable .exe for Windows.
#
# The Mac build is intentionally ad-hoc signed (identity: null) so it can be
# built on any machine without an Apple Developer account. For App Store or
# public-distribution builds, set identity to a Developer ID certificate and
# flip notarize on.
appId: com.sepia.app
productName: Sepia
directories:
  output: dist-release
  buildResources: assets
files:
  - dist/**
  - dist-electron/**
  - package.json
  # Ship the runtime assets — trayTemplate lives here and is loaded by
  # nativeImage at app start. (directories.buildResources is only for
  # files electron-builder consumes during packaging, not runtime.)
  - assets/**
# Leave behind any large dev-only files; sharpens the packaged bundle.
asar: true
compression: maximum
# Re-sign the packaged .app with a real Sepia bundle identifier so macOS
# TCC doesn't lump us in with every other Electron app (see comment inside
# the hook for the full rationale).
afterPack: scripts/after-pack.mjs

mac:
  category: public.app-category.graphics-design
  # electron-builder will convert this 512×512 PNG into the .icns bundle.
  icon: assets/icon.png
  # Ad-hoc signing: every binary inside the bundle is signed with a throwaway
  # identity so macOS doesn't reject it outright. Screen Recording permissions
  # are bound to this local identity, so each rebuild re-registers the app in
  # System Settings. For a stable signed identity, replace null with your
  # Developer ID Application name.
  identity: null
  notarize: false
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  # Set a simple layout so the .dmg feels polished on first-open.
  title: ${productName} ${version}
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications

win:
  # Windows shell + NSIS installer both require a real multi-size .ico —
  # a .png here fails inside the NSIS macros with "invalid icon file".
  # scripts/generate-icons.mjs builds assets/icon.ico with 16–256 sizes.
  icon: assets/icon.ico
  # File metadata that Windows shows in Explorer → Properties → Details.
  # Not signed — Windows SmartScreen will warn "publisher unknown" until a
  # code-signing cert is wired in; see README.md for the upgrade path.
  publisherName: Sepia
  verifyUpdateCodeSignature: false
  # Build both flavors so the user can choose install vs. portable:
  #   • nsis     → a real installer (Start Menu shortcut, uninstaller)
  #   • portable → a single self-extracting .exe that runs from anywhere
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64

nsis:
  # Best-practice defaults for a desktop app installer:
  #   - Not one-click: show the user what's happening, let them pick options.
  #   - Per-user by default (no UAC elevation unless they choose per-machine)
  #     so Sepia installs into %LOCALAPPDATA%\Programs and upgrades cleanly.
  #   - Start Menu shortcut on by default, Desktop shortcut user-choosable.
  #   - Finish page offers "Run Sepia" on completion.
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sepia
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  # Installer and uninstaller icons — Windows shell uses the app icon by
  # default, but explicit paths here make the intent obvious for anyone
  # reading this config later.
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

portable:
  # The portable .exe unpacks into a temp dir on each run. Name the file
  # so the user can spot it immediately in Downloads.
  artifactName: Sepia-${version}-portable-${arch}.exe
